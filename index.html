/* ============ THEMES (CSS variables) ============ */
:root, [data-theme="maroon"]{
  --bg:#120303; --bg2:#1a0505; --bg3:#240a0a; --card:#1e0707; --card2:#2a0c0c;
  --text:#ffffff; --text2:#d8b9b9; --muted:#9c7474;
  --accent:#c41e3a; --accent2:#8b0000; --accent-soft:rgba(196,30,58,.16);
  --glow:0 0 18px rgba(196,30,58,.45), 0 0 40px rgba(139,0,0,.25);
  --glow-soft:0 0 10px rgba(196,30,58,.30);
  --border:#3a1111; --green:#3ddc84; --down:#7a8cff;
}
[data-theme="mono"]{
  --bg:#000000; --bg2:#0a0a0a; --bg3:#141414; --card:#101010; --card2:#1a1a1a;
  --text:#ffffff; --text2:#cccccc; --muted:#888888;
  --accent:#ffffff; --accent2:#aaaaaa; --accent-soft:rgba(255,255,255,.10);
  --glow:0 0 14px rgba(255,255,255,.25); --glow-soft:0 0 8px rgba(255,255,255,.18);
  --border:#2a2a2a; --green:#3ddc84; --down:#9aa4b5;
}
[data-theme="light"]{
  --bg:#f6f4f2; --bg2:#ffffff; --bg3:#efe9e7; --card:#ffffff; --card2:#f3eded;
  --text:#141414; --text2:#3c3c3c; --muted:#7c7c7c;
  --accent:#8b0000; --accent2:#c41e3a; --accent-soft:rgba(139,0,0,.08);
  --glow:0 4px 18px rgba(139,0,0,.14); --glow-soft:0 2px 8px rgba(0,0,0,.10);
  --border:#ddd2d2; --green:#1f9e5f; --down:#3551d1;
}
/* ============ BASE ============ */
*{box-sizing:border-box; margin:0; padding:0}
html,body{height:100%}
body{
  background:var(--bg); color:var(--text);
  font-family:'Segoe UI', system-ui, -apple-system, Roboto, Helvetica, Arial, sans-serif;
  background-image:radial-gradient(ellipse 80% 50% at 50% -10%, var(--accent-soft), transparent);
  background-attachment:fixed;
}
a{color:inherit; text-decoration:none}
button{font-family:inherit; cursor:pointer}
input,textarea,select{font-family:inherit; color:var(--text); background:var(--bg3); border:1px solid var(--border); border-radius:10px; padding:10px 12px; font-size:14px; outline:none; width:100%}
input:focus,textarea:focus{border-color:var(--accent); box-shadow:var(--glow-soft)}
::placeholder{color:var(--muted)}
::-webkit-scrollbar{width:9px} ::-webkit-scrollbar-thumb{background:var(--border); border-radius:9px}
/* ============ LAYOUT ============ */
#app{max-width:1180px; margin:0 auto; display:grid; grid-template-columns:230px 1fr; gap:0; min-height:100vh}
@media(max-width:880px){ #app{grid-template-columns:1fr} .sidebar{display:none} .mobilebar{display:flex!important} body{padding-bottom:64px} }
.sidebar{
  border-right:1px solid var(--border); padding:22px 16px; position:sticky; top:0; height:100vh;
  display:flex; flex-direction:column; gap:6px; background:linear-gradient(180deg, var(--bg2), transparent);
}
.logo{font-family:Georgia,'Times New Roman',serif; font-size:34px; letter-spacing:6px; font-weight:bold; padding:4px 12px 18px; text-shadow:var(--glow); user-select:none}
.logo span{color:var(--accent)}
.navbtn{display:flex; align-items:center; gap:12px; padding:11px 14px; border-radius:12px; font-size:15px; color:var(--text2); border:1px solid transparent; background:none; width:100%; text-align:left; transition:.15s}
.navbtn:hover{background:var(--accent-soft); color:var(--text)}
.navbtn.active{background:var(--accent-soft); color:var(--text); border-color:var(--border); box-shadow:var(--glow-soft); font-weight:600}
.navbtn .ico{width:22px; text-align:center; font-size:17px}
.navbadge{margin-left:auto; background:var(--accent); color:#fff; font-size:11px; min-width:19px; height:19px; border-radius:10px; display:inline-flex; align-items:center; justify-content:center; padding:0 5px; font-weight:700}
[data-theme="mono"] .navbadge{color:#000}
.postbtn{margin-top:14px; background:linear-gradient(135deg, var(--accent2), var(--accent)); color:#fff; border:none; border-radius:14px; padding:13px; font-size:15px; font-weight:700; letter-spacing:1px; box-shadow:var(--glow); transition:.2s}
[data-theme="mono"] .postbtn{color:#000}
.postbtn:hover{transform:translateY(-1px); filter:brightness(1.15)}
.sidefoot{margin-top:auto; font-size:11px; color:var(--muted); padding:10px 12px; line-height:1.7}
.sidefoot a{color:var(--accent2); text-decoration:underline dotted}
.mobilebar{display:none; position:fixed; bottom:0; left:0; right:0; background:var(--bg2); border-top:1px solid var(--border); z-index:60; justify-content:space-around; padding:8px 4px calc(8px + env(safe-area-inset-bottom))}
.mobilebar button{background:none; border:none; color:var(--text2); font-size:21px; padding:6px 14px; border-radius:10px; position:relative}
.mobilebar button.active{color:var(--accent); background:var(--accent-soft)}
.mobilebar .navbadge{position:absolute; top:0; right:4px}
main{padding:0 0 60px; min-width:0}
.topbar{position:sticky; top:0; z-index:50; backdrop-filter:blur(12px); background:color-mix(in srgb, var(--bg) 78%, transparent); border-bottom:1px solid var(--border); padding:14px 22px; display:flex; align-items:center; gap:14px}
.topbar h1{font-size:19px; font-weight:700; letter-spacing:.5px}
.topbar .sub{font-size:12px; color:var(--muted)}
.content{padding:20px 22px; max-width:760px}
.wide .content{max-width:none}
/* ============ COMPONENTS ============ */
.card{background:var(--card); border:1px solid var(--border); border-radius:16px; padding:18px; margin-bottom:14px; transition:.15s}
.card:hover{border-color:color-mix(in srgb, var(--accent) 45%, var(--border)); box-shadow:var(--glow-soft)}
.tabs{display:flex; gap:8px; margin-bottom:18px; flex-wrap:wrap}
.tab{background:var(--bg3); border:1px solid var(--border); color:var(--text2); padding:8px 18px; border-radius:999px; font-size:13.5px; font-weight:600; transition:.15s}
.tab.active{background:linear-gradient(135deg,var(--accent2),var(--accent)); color:#fff; border-color:transparent; box-shadow:var(--glow-soft)}
[data-theme="mono"] .tab.active{color:#000}
.avatar{border-radius:50%; object-fit:cover; flex-shrink:0; background:var(--bg3); border:2px solid var(--border)}
.av-gen{border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-weight:800; color:#fff; border:2px solid var(--border); font-family:Georgia,serif; user-select:none}
.posthead{display:flex; align-items:center; gap:11px; margin-bottom:10px}
.posthead .uname{font-weight:700; font-size:14.5px}
.posthead .uname:hover{color:var(--accent); cursor:pointer}
.posthead .meta{font-size:12px; color:var(--muted)}
.topicchip{font-size:11px; background:var(--accent-soft); color:var(--accent); border:1px solid color-mix(in srgb, var(--accent) 35%, transparent); padding:2.5px 10px; border-radius:999px; font-weight:700; cursor:pointer}
[data-theme="mono"] .topicchip{color:var(--text)}
.posttext{font-size:15px; line-height:1.65; color:var(--text); white-space:pre-wrap; word-wrap:break-word}
.postimg{width:100%; max-height:420px; object-fit:cover; border-radius:12px; margin-top:12px; border:1px solid var(--border)}
.actions{display:flex; gap:6px; margin-top:14px; align-items:center; flex-wrap:wrap}
.act{display:flex; align-items:center; gap:7px; background:var(--bg3); border:1px solid var(--border); color:var(--text2); padding:7px 14px; border-radius:999px; font-size:13px; font-weight:600; transition:.15s}
.act:hover{border-color:var(--accent); color:var(--text); box-shadow:var(--glow-soft)}
.act.on-up{background:var(--accent-soft); color:var(--accent); border-color:var(--accent)}
[data-theme="mono"] .act.on-up{color:var(--text)}
.act.on-down{background:rgba(122,140,255,.12); color:var(--down); border-color:var(--down)}
.badge{display:inline-flex; align-items:center; gap:5px; font-size:11px; font-weight:800; padding:3px 10px; border-radius:999px; letter-spacing:.5px}
.badge.echo{background:rgba(255,170,0,.15); color:#ffaa33; border:1px solid rgba(255,170,0,.4)}
.badge.resonance{background:rgba(190,80,255,.15); color:#c879ff; border:1px solid rgba(190,80,255,.4)}
.badge.seal{background:var(--accent-soft); color:var(--accent); border:1px solid var(--accent)}
.badge.pioneer{background:rgba(61,220,132,.12); color:var(--green); border:1px solid rgba(61,220,132,.4)}
.badge.streak{background:rgba(255,120,40,.13); color:#ff8c42; border:1px solid rgba(255,120,40,.4)}
.badge.mutual{background:rgba(61,220,132,.10); color:var(--green); border:1px solid rgba(61,220,132,.35)}
[data-theme="light"] .badge.echo{color:#9a6400} 
.btn{background:linear-gradient(135deg,var(--accent2),var(--accent)); color:#fff; border:none; border-radius:11px; padding:10px 22px; font-size:14px; font-weight:700; transition:.15s; box-shadow:var(--glow-soft)}
[data-theme="mono"] .btn{color:#000}

.btn.ghost{background:var(--bg3); color:var(--text); border:1px solid var(--border); box-shadow:none}
.btn.sm{padding:7px 16px; font-size:13px; border-radius:9px}
.empty{text-align:center; color:var(--muted); padding:50px 20px; font-size:14px; line-height:1.8}
.empty .big{font-size:40px; display:block; margin-bottom:10px}

.banner::after{content:''; position:absolute; inset:0; background:radial-gradient(circle at 80% 20%, rgba(255,255,255,.22), transparent 55%)}
.profilecard{background:var(--card); border:1px solid var(--border); border-radius:18px; margin-bottom:16px; overflow:hidden}
.pbody{padding:0 22px 20px; margin-top:-46px; position:relative}
.pfp-ring{width:96px; height:96px; border-radius:50%; padding:3px; background:conic-gradient(var(--accent), #ff8c42, var(--accent2), var(--accent)); box-shadow:var(--glow); display:inline-block; animation:ringspin 6s linear infinite}
@keyframes ringspin{to{filter:hue-rotate(20deg)}}
.statrow{display:flex; gap:26px; margin:14px 0; flex-wrap:wrap}
.stat b{font-size:17px} .stat span{font-size:12.5px; color:var(--muted); margin-left:5px}
.stat{cursor:default}
.tagrow{display:flex; gap:7px; flex-wrap:wrap; margin-top:12px}
.voicecard{display:flex; align-items:center; gap:12px; background:var(--bg3); border:1px solid var(--border); border-radius:12px; padding:10px 14px; margin-top:12px; max-width:340px}
.playbtn{width:38px; height:38px; border-radius:50%; background:linear-gradient(135deg,var(--accent2),var(--accent)); border:none; color:#fff; font-size:15px; flex-shrink:0; box-shadow:var(--glow-soft)}
.wavebar{display:flex; gap:2.5px; align-items:center; height:26px; flex:1}
.wavebar i{width:3px; background:var(--accent); border-radius:3px; opacity:.65}
.ranks{display:flex; gap:8px; flex-wrap:wrap; margin-top:12px}

.rankchip b{color:var(--accent)} [data-theme="mono"] .rankchip b{color:var(--text)}

.lbwrap{display:flex; gap:24px; align-items:center; flex-wrap:wrap; justify-content:center}
.lblegend{display:flex; flex-direction:column; gap:9px; min-width:210px}

.lbdot{width:11px; height:11px; border-radius:50%; flex-shrink:0}
.lbrow .pct{margin-left:auto; color:var(--muted); font-size:12px; font-weight:700}
svg.donut .seg{transition:opacity .15s, stroke-width .15s; cursor:pointer}
svg.donut .seg:hover{stroke-width:34}
/* modal */
.overlay{position:fixed; inset:0; background:rgba(0,0,0,.65); backdrop-filter:blur(4px); z-index:100; display:flex; align-items:flex-start; justify-content:center; padding:60px 16px}
.modal{background:var(--bg2); border:1px solid var(--border); border-radius:18px; width:100%; max-width:540px; padding:22px; box-shadow:var(--glow); animation:pop .18s ease}

.modal h2{font-size:18px; margin-bottom:16px}
.field{margin-bottom:14px}
.field label{display:block; font-size:12.5px; color:var(--muted); margin-bottom:6px; font-weight:600; letter-spacing:.3px}
.toast{position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:var(--card2); border:1px solid var(--accent); color:var(--text); padding:11px 22px; border-radius:999px; font-size:13.5px; z-index:200; box-shadow:var(--glow); animation:pop .2s}
/* notifications */
.notifrow{display:flex; gap:12px; align-items:flex-start; padding:13px 14px; border-radius:12px; border:1px solid var(--border); background:var(--card); margin-bottom:9px; font-size:14px}
.notifrow.unread{border-color:var(--accent); background:var(--accent-soft)}
.notifrow .t{font-size:11.5px; color:var(--muted); margin-top:3px}

.themegrid{display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:12px}
.themeopt{border:2px solid var(--border); border-radius:14px; padding:14px; cursor:pointer; text-align:center; transition:.15s}
.themeopt.active{border-color:var(--accent); box-shadow:var(--glow-soft)}
.swatch{height:54px; border-radius:9px; margin-bottom:10px; border:1px solid var(--border); position:relative; overflow:hidden}
.comment{display:flex; gap:10px; padding:12px 0; border-top:1px solid var(--border); font-size:14px}
.searchbox{position:relative; margin-bottom:18px}
.commgrid{display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:14px}
.hr{border:none; border-top:1px solid var(--border); margin:16px 0}
.muted{color:var(--muted); font-size:12.5px}
.link{color:var(--accent); cursor:pointer; font-weight:600}
[data-theme="mono"] .link{color:var(--text); text-decoration:underline}
.notice{background:var(--accent-soft); border:1px solid color-mix(in srgb,var(--accent) 40%, transparent); border-radius:13px; padding:13px 16px; font-size:13px; line-height:1.65; margin-bottom:18px; color:var(--text2)}

</style>
</head>

/* ============ LOCAL STATE (demo persistence) ============ */
const LS_KEY="lore_state_v1";
let S = loadState();
function loadState(){
  try{ const s=JSON.parse(localStorage.getItem(LS_KEY)); if(s && s.me) return s; }catch(e){}
  return { me:"you", theme:"maroon",
    profile:{bio:"New to LORE. Writing my first pages.",pfp:"",tags:["Tech"],voice:"",joined:new Date().toISOString().slice(0,10)},
    myPosts:[], votes:{}, follows:["androbeet"], comments:{}, joined:[], readNotifs:false, shares:{} };
}
function save(){ localStorage.setItem(LS_KEY, JSON.stringify(S)); }

/* ============ HELPERS ============ */
const $=s=>document.querySelector(s);
const esc=s=>String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
function timeAgo(ts){const d=(Date.now()-ts)/1000;if(d<60)return"just now";if(d<3600)return Math.floor(d/60)+"m ago";if(d<86400)return Math.floor(d/3600)+"h ago";if(d<604800)return Math.floor(d/86400)+"d ago";return new Date(ts).toLocaleDateString();}
function userColor(u){ if(SEED.users[u]) return SEED.users[u].color; let h=0; for(const c of u) h=(h*31+c.charCodeAt(0))%360; return `hsl(${h},62%,46%)`; }
function avatarHTML(u,size){
  const url = u===S.me ? S.profile.pfp : (SEED.users[u]?.pfp||"");
  if(url) return `<img class="avatar" src="${esc(url)}" width="${size}" height="${size}" alt="${esc(u)}" onerror="this.outerHTML=genAv('${esc(u)}',${size})">`;
  return genAv(u,size);
}
function genAv(u,size){ return `<div class="av-gen" style="width:${size}px;height:${size}px;font-size:${size*0.42}px;background:linear-gradient(135deg,${userColor(u)},#000c)">${esc(u[0].toUpperCase())}</div>`; }
function toast(msg){ const t=document.createElement("div"); t.className="toast"; t.textContent=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),2400); }
function allPosts(){
  const mine = S.myPosts.map(p=>({...p}));
  const seeded = SEED.posts.map(p=>{
    const v=S.votes[p.id], extra=S.comments[p.id]||[];
    const up=[...p.up], down=[...p.down];
    if(v==="up")up.push(S.me); if(v==="down")down.push(S.me);
    return {...p, up, down, comments:[...p.comments, ...extra], shares:p.shares+(S.shares[p.id]||0)};
  });
  return [...mine, ...seeded].sort((a,b)=>b.ts-a.ts);
}
function getUser(u){
  if(u===S.me) return {bio:S.profile.bio,pfp:S.profile.pfp,tags:S.profile.tags,voice:S.profile.voice,followers:[],following:S.follows,joined:S.profile.joined,streak:{count:S.myPosts.length,tier:S.myPosts.length>=30?"Silver":S.myPosts.length>=7?"Bronze":"—"},seal:false,echoes:0,resonance:0,pioneer:0,ranks:{},color:"#c41e3a"};
  return SEED.users[u];
}
function unreadCount(){ return S.readNotifs?0:SEED.notifications.filter(n=>!n.read).length; }
function refreshBadges(){
  const n=unreadCount();
  for(const id of["bellbadge","bellbadge2"]){const el=document.getElementById(id); if(el){el.style.display=n?"inline-flex":"none"; el.textContent=n;}}
}

/* ============ ROUTER ============ */
const routes={};
function nav(hash){ location.hash=hash; }
window.addEventListener("hashchange",render);
document.querySelectorAll("[data-nav]").forEach(b=>b.addEventListener("click",()=>nav("#/"+b.dataset.nav)));
function setActive(name){
  document.querySelectorAll("[data-nav]").forEach(b=>b.classList.toggle("active",b.dataset.nav===name));
}
function header(title,sub){ $("#pagetitle").textContent=title; $("#pagesub").textContent=sub||""; }

function render(){
  const h=(location.hash||"#/explore").slice(2);
  const [page,arg]=h.split("/").map(decodeURIComponent);
  refreshBadges();
  window.scrollTo(0,0);
  const fn=routes[page]||routes.explore;
  setActive(page==="u"?"":page);
  fn(arg);
}

/* ============ POST CARD ============ */
function postCard(p, full){
  const score=p.up.length-p.down.length;
  const myVote=p.up.includes(S.me)?"up":p.down.includes(S.me)?"down":"";
  const echoBadge=p.echo==="RESONANCE"?`<span class="badge resonance">⚡ RESONANCE</span>`:p.echo==="ECHO"?`<span class="badge echo">〰 ECHO</span>`:"";
  return `<div class="card" ${full?"":`onclick="if(!event.target.closest('button,.uname,.topicchip,a'))nav('#/post/${p.id}')"`} style="${full?"":"cursor:pointer"}">
    <div class="posthead">
      ${avatarHTML(p.author,40)}
      <div>
        <div class="uname" onclick="event.stopPropagation();nav('#/u/${esc(p.author)}')">@${esc(p.author)} ${SEED.users[p.author]?.seal?'<span class="badge seal" title="Androbeet Seal">⭐</span>':""}</div>
        <div class="meta">${timeAgo(p.ts)}</div>
      </div>
      <div style="margin-left:auto; display:flex; gap:7px; align-items:center">
        ${echoBadge}
        <span class="topicchip" onclick="event.stopPropagation();nav('#/topic/${esc(p.topic)}')">#${esc(p.topic)}</span>
      </div>
    </div>
    <div class="posttext">${esc(p.text)}</div>
    ${p.img?`<img class="postimg" src="${esc(p.img)}" alt="post image" loading="lazy" onerror="this.style.display='none'">`:""}
    <div class="actions">
      <button class="act ${myVote==="up"?"on-up":""}" onclick="event.stopPropagation();vote('${p.id}','up')">▲ ${p.up.length}</button>
      <button class="act ${myVote==="down"?"on-down":""}" onclick="event.stopPropagation();vote('${p.id}','down')">▼ ${p.down.length}</button>
      <button class="act" onclick="event.stopPropagation();nav('#/post/${p.id}')">💬 ${p.comments.length}</button>
      <button class="act" onclick="event.stopPropagation();sharePost('${p.id}')">↗ ${p.shares}</button>
      <span class="muted" style="margin-left:auto">${score>=0?"+":""}${score}</span>
    </div>
  </div>`;
}

function vote(id,dir){
  const mine=S.myPosts.find(p=>p.id===id);
  if(mine){
    const arr=dir==="up"?mine.up:mine.down, other=dir==="up"?mine.down:mine.up;
    const i=arr.indexOf(S.me);
    if(i>=0)arr.splice(i,1); else {arr.push(S.me); const j=other.indexOf(S.me); if(j>=0)other.splice(j,1);}
  } else {
    S.votes[id]=S.votes[id]===dir?"":dir;
  }
  save(); render();
  if(LIVE) api("/vote",{post:id,dir});
}
function sharePost(id){
  S.shares[id]=(S.shares[id]||0)+1; save();
  const url=location.origin+location.pathname+"#/post/"+id;
  if(navigator.clipboard) navigator.clipboard.writeText(url).then(()=>toast("Permalink copied — shared!")).catch(()=>toast("Share link: "+url));
  else toast("Share link: "+url);
  render();
}
async function api(path,body){
  try{ await fetch(CONFIG.WORKER_URL+path,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)}); }catch(e){}
}

/* ============ PAGES ============ */
routes.explore = ()=>{
  header("Explore","the latest Lore");
  const tab = sessionStorage.getItem("exptab")||"Hot";
  const posts=allPosts();
  let sorted=[...posts];
  if(tab==="Hot") sorted.sort((a,b)=>(b.up.length-b.down.length)-(a.up.length-a.down.length));
  if(tab==="Rising") sorted.sort((a,b)=>((b.up.length+b.comments.length)/Math.max(1,(Date.now()-b.ts)/3.6e6))-((a.up.length+a.comments.length)/Math.max(1,(Date.now()-a.ts)/3.6e6)));
  if(tab==="Random") sorted.sort(()=>Math.random()-0.5);
  $("#content").innerHTML = `
    ${LIVE?"":`<div class="notice"><b>Demo mode.</b> This build runs fully on GitHub Pages with sample data — votes, posts and follows persist in your browser. Connect a Cloudflare Worker in <span class="link" onclick="nav('#/settings')">Settings → Go Live</span> to turn on the real shared database.</div>`}
    <div class="tabs">${["Hot","Rising","New","Random"].map(t=>`<button class="tab ${t===tab?"active":""}" onclick="sessionStorage.setItem('exptab','${t}');render()">${t}</button>`).join("")}</div>
    ${sorted.map(p=>postCard(p)).join("")||`<div class="empty"><span class="big">🕳</span>No posts yet. Be the first page of the Lore.</div>`}`;
};

routes.post = (id)=>{
  const p=allPosts().find(x=>x.id===id);
  if(!p){ $("#content").innerHTML=`<div class="empty"><span class="big">🕳</span>This post isn't part of the Lore (yet).</div>`; header("Post"); return; }
  header("Post","by @"+p.author);
  $("#content").innerHTML = postCard(p,true) + `
    <div class="card">
      <div style="display:flex; gap:10px">
        ${avatarHTML(S.me,36)}
        <input id="cmtbox" placeholder="Add to the thread…" onkeydown="if(event.key==='Enter')addComment('${p.id}')">
        <button class="btn sm" onclick="addComment('${p.id}')">Reply</button>
      </div>
      <div style="margin-top:14px">
        ${p.comments.map((c,i)=>`<div class="comment">
          ${avatarHTML(c.a,32)}
          <div><b style="cursor:pointer" onclick="nav('#/u/${esc(c.a)}')">@${esc(c.a)}</b>
          ${p.pioneer===c.a&&i===0?'<span class="badge pioneer">🚩 PIONEER</span>':""}
          <span class="muted" style="margin-left:6px">${timeAgo(c.ts)}</span>
          <div style="margin-top:4px">${esc(c.t)}</div></div>
        </div>`).join("")||`<div class="muted" style="padding:10px 0">No replies yet. Claim the PIONEER badge.</div>`}
      </div>
    </div>`;
};
function addComment(id){
  const v=$("#cmtbox").value.trim(); if(!v)return;
  const mine=S.myPosts.find(p=>p.id===id);
  const c={a:S.me,t:v,ts:Date.now()};
  if(mine) mine.comments.push(c); else (S.comments[id]=S.comments[id]||[]).push(c);
  save(); render(); toast("Reply added");
  if(LIVE) api("/comment",{post:id,text:v});
}

routes.topic = (name)=>{

  $("#content").innerHTML = lb + (posts.map(p=>postCard(p)).join("") ||
    `<div class="empty"><span class="big">#</span>Nothing in #${esc(name)} yet.<br><span class="link" onclick="openCompose('${esc(name)}')">Write the first post →</span></div>`);
};

function leaderboardCard(){
  const L=SEED.leaderboard;
  const total=L.rows.reduce((a,r)=>a+r.engagement,0);
  const R=70, C=2*Math.PI*R; let off=0;
  const segs=L.rows.map(r=>{
    const frac=r.engagement/total, len=frac*C;
    const s=`<circle class="seg" r="${R}" cx="100" cy="100" fill="none" stroke="${r.color}" stroke-width="28"
      stroke-dasharray="${len-2} ${C-len+2}" stroke-dashoffset="${-off}" transform="rotate(-90 100 100)">
      <title>@${r.user} — ${(frac*100).toFixed(0)}% of engagement</title></circle>`;
    off+=len; return s;
  }).join("");
  return `<div class="card" style="border-color:var(--accent); box-shadow:var(--glow-soft)">
    <div style="display:flex; align-items:center; gap:10px; margin-bottom:6px">
      <span class="badge seal">📌 PINNED</span><b>Monthly Chart — ${esc(L.topic)} · ${esc(L.month)}</b>
    </div>
    <div class="muted" style="margin-bottom:14px">Auto-posted by GitHub Actions on the 1st of every month.</div>
    <div class="lbwrap">
      <svg class="donut" width="200" height="200" viewBox="0 0 200 200">
        ${segs}
        <text x="100" y="95" text-anchor="middle" fill="var(--text)" font-size="13" font-weight="700">ENGAGEMENT</text>
        <text x="100" y="114" text-anchor="middle" fill="var(--muted)" font-size="11">${total} interactions</text>
      </svg>
      <div class="lblegend">
        ${L.rows.map((r,i)=>`<div class="lbrow" onclick="nav('#/u/${r.user}')">
          <span class="lbdot" style="background:${r.color}"></span>
          <b>#${i+1}</b> @${esc(r.user)} <span class="pct">${((r.engagement/total)*100).toFixed(0)}%</span>
        </div>`).join("")}
        <div class="muted" style="margin-top:4px">▲ Most upvoted: <b>@${esc(L.mostUp)}</b> &nbsp;·&nbsp; ▼ Most controversial: <b>@${esc(L.mostDown)}</b></div>
      </div>
    </div>
  </div>`;
}

function toggleFollow(u){

let voiceCtx=null;
function playVoice(){
  // demo voice card: a short synth chime via WebAudio (no files needed)
  try{
    voiceCtx=voiceCtx||new (window.AudioContext||window.webkitAudioContext)();
    const now=voiceCtx.currentTime;
    [220,277,330,440].forEach((f,i)=>{
      const o=voiceCtx.createOscillator(), g=voiceCtx.createGain();
      o.frequency.value=f; o.type="sine";
      g.gain.setValueAtTime(0.0001,now+i*0.16); g.gain.exponentialRampToValueAtTime(0.12,now+i*0.16+0.03); g.gain.exponentialRampToValueAtTime(0.0001,now+i*0.16+0.5);
      o.connect(g).connect(voiceCtx.destination); o.start(now+i*0.16); o.stop(now+i*0.16+0.55);
    });
    toast("▶ playing voice card");
  }catch(e){ toast("Voice cards play audio from any URL (Catbox/Discord CDN)"); }
}

function doSearch(){ $("#results").innerHTML=searchResults($("#q").value.trim().toLowerCase()); }
function searchResults(q){
  const users=Object.keys(SEED.users).concat([S.me]).filter(u=>u.toLowerCase().includes(q.replace("@","")));
  const posts=q?allPosts().filter(p=>p.text.toLowerCase().includes(q)||p.topic.toLowerCase().includes(q)):[];
  let html=`<div class="muted" style="margin-bottom:10px">PEOPLE</div>`;
  html+=users.map(u=>`<div class="card" style="display:flex; align-items:center; gap:13px; padding:13px 16px; cursor:pointer" onclick="nav('#/u/${esc(u)}')">
    ${avatarHTML(u,42)}
    <div><b>@${esc(u)}</b> ${SEED.users[u]?.seal?'<span class="badge seal">⭐</span>':""}
    <div class="muted" style="margin-top:3px">${esc((getUser(u)?.bio||"").slice(0,70))}…</div></div>
    <span style="margin-left:auto" class="link">view →</span>
  </div>`).join("")||`<div class="muted">No users match.</div>`;
  if(q) html+=`<div class="muted" style="margin:16px 0 10px">POSTS</div>`+(posts.map(p=>postCard(p)).join("")||`<div class="muted">No posts match.</div>`);
  return html;
}

routes.notifications = ()=>{
  header("Notifications","");
  const icons={follow:"👤",upvote:"▲",comment:"💬",seal:"⭐",rank_change:"📈",mention:"@"};
  const msg=n=>{
    if(n.type==="follow")return `<b>@${n.from}</b> started following you`;
    if(n.type==="upvote")return `<b>@${n.from}</b> upvoted your post`;
    if(n.type==="comment")return `<b>@${n.from}</b> replied: “${esc(n.snippet)}”`;
    if(n.type==="seal")return `<b>@${n.from}</b> awarded your post the <b>Androbeet Seal</b> ⭐`;
    if(n.type==="rank_change")return `You climbed <b>#${n.oldRank} → #${n.newRank}</b> in #${n.topic} 🔥`;
    return "activity";
  };
  $("#content").innerHTML = `
    <div style="display:flex; justify-content:flex-end; margin-bottom:12px"><button class="btn ghost sm" onclick="S.readNotifs=true;save();render()">Mark all read</button></div>
    ${SEED.notifications.map(n=>`<div class="notifrow ${(!n.read&&!S.readNotifs)?"unread":""}">

    </div>`).join("")}`;
};

function setTheme(t){ S.theme=t; save(); document.body.dataset.theme=t; render(); }
function toggleTag(t){
  const i=S.profile.tags.indexOf(t);
  if(i>=0)S.profile.tags.splice(i,1); else S.profile.tags.push(t);
  save(); render();
}
function saveProfile(){
  const name=$("#f_name").value.trim().toLowerCase().replace(/[^a-z0-9_]/g,"");
  if(name) S.me=name;
  S.profile.bio=$("#f_bio").value.trim();
  S.profile.pfp=$("#f_pfp").value.trim();
  S.profile.voice=$("#f_voice").value.trim();
  save(); toast("Profile saved ✓"); render();
  if(LIVE) api("/update-profile",{...S.profile,username:S.me});
}

/* ============ COMPOSE ============ */
function openCompose(topic){
  $("#modalroot").innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <h2>✒ Add to the Lore</h2>
      <div class="field"><textarea id="c_text" rows="5" placeholder="What's on your mind, @${esc(S.me)}?" autofocus></textarea></div>
      <div class="field"><label>TOPIC (required)</label>
        <select id="c_topic">${SEED.tags.map(t=>`<option ${t===topic?"selected":""}>${esc(t)}</option>`).join("")}</select></div>
      <div class="field"><label>IMAGE LINK (optional — Imgur/Catbox URL, we never store files)</label><input id="c_img" placeholder="https://…"></div>
      <div style="display:flex; gap:10px; justify-content:flex-end">
        <button class="btn ghost" onclick="closeModal()">Cancel</button>
        <button class="btn" onclick="submitPost()">Post</button>
      </div>
    </div></div>`;
  setTimeout(()=>$("#c_text").focus(),50);
}
function closeModal(){ $("#modalroot").innerHTML=""; }
function submitPost(){
  const text=$("#c_text").value.trim();
  if(!text){ toast("Write something first"); return; }
  const p={id:"my_"+Date.now(), author:S.me, topic:$("#c_topic").value, ts:Date.now(),
    text, img:$("#c_img").value.trim(), up:[], down:[], shares:0, echo:"", pioneer:"", comments:[]};
  S.myPosts.unshift(p); save(); closeModal();
  nav("#/explore"); sessionStorage.setItem("exptab","New"); render();
  toast("Posted — it's part of the Lore now ✓");
  if(LIVE) api("/post",p);
}
