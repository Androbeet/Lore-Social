  <div class="box">
    <div class="logo">L<span>O</span>RE</div>
    <h1>404</h1>
    <p>This page isn't part of the Lore. It may have been a myth all along —
    or the link is broken.</p>
    <a href="./">← Return to the Lore</a>
  </div>
  <script>
    // If the URL looks like an app route (e.g. /lore/post/p1), bounce back
    // into the single-page app with the hash router.
    const path = location.pathname.split('/').filter(Boolean);
    if (path.length > 1) {
      const tail = path.slice(1).join('/');
      if (/^(post|u|topic)\//.test(tail)) location.replace('./#/' + tail);
    }
  </script>
